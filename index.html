<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioLearner - AI Audio Lesson Generator</title>
    <style>
        :root {
            --teal-primary: #2ba868;
            --teal-secondary: #38f9d7;
            --teal-deep: #1a6b47;
            --teal-deep-hover: #145239;
            --coral-accent: #D946A6;
            --coral-hover: #C72E95;
            --black-primary: #0A0A0A;
            --cream-bg: #F8F6F3;
            --warm-white: #FFFEFB;
            --slate-text: #626C71;
            --slate-light: #A7B0B5;
            --border-subtle: #E5E7E8;
            --font-display: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-display);
            background-color: var(--cream-bg);
            color: var(--black-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 700px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            height: 60px;
            border-radius: 20px 20px 0 0;
        }

        .header-accent {
            height: 4px;
            background: var(--teal-primary);
        }

        .header-content {
            padding: 16px 30px 12px 30px;
            background: white;
            text-align: center;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            line-height: 1.3;
            color: var(--black-primary);
            margin-bottom: 4px;
        }

        .header-description {
            font-size: 14px;
            color: var(--slate-text);
            line-height: 1.6;
            opacity: 0.95;
        }

        .content {
            padding: 12px 25px 25px 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 16px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--black-primary);
        }

        input[type="text"],
        .custom-select {
            padding: 14px;
            border: 2px solid var(--border-subtle);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            background: white;
            color: var(--black-primary);
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        .custom-select:focus-within {
            outline: none;
            border-color: var(--teal-primary);
            box-shadow: 0 0 0 4px rgba(43, 168, 104, 0.1);
        }

        input[type="text"]::placeholder {
            color: var(--slate-light);
        }

        .custom-select {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            padding-right: 14px;
        }

        .custom-select.active {
            border-color: var(--teal-primary);
            box-shadow: 0 0 0 4px rgba(43, 168, 104, 0.1);
        }

        .select-text {
            flex: 1;
        }

        .select-text.placeholder {
            color: var(--slate-light);
        }

        .select-arrow {
            width: 20px;
            height: 20px;
            stroke: var(--teal-primary);
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .custom-select.active .select-arrow {
            transform: rotate(180deg);
        }

        .select-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: white;
            border: 2px solid var(--border-subtle);
            border-radius: 10px;
            z-index: 100;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .custom-select.active .select-dropdown {
            display: block;
        }

        .select-option {
            padding: 12px 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .select-option:hover {
            background: var(--cream-bg);
        }

        .select-option.selected {
            background: rgba(43, 168, 104, 0.1);
            color: var(--teal-primary);
            font-weight: 600;
        }

        select {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #generateBtn {
            background: var(--teal-primary);
            color: white;
            box-shadow: 0 4px 15px rgba(43, 168, 104, 0.3);
        }

        #generateBtn:hover:not(:disabled) {
            background: #248f59;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(43, 168, 104, 0.4);
        }

        #generateBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .clear-btn {
            background: var(--black-primary);
            color: white;
            border: 2px solid var(--black-primary);
        }

        .clear-btn:hover {
            background: #2a2a2a;
            border-color: #2a2a2a;
        }

        .message {
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            margin: 10px 0;
        }

        .error-message {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 20px;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background: var(--teal-primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(1) { animation-delay: 0s; }
        .loading span:nth-child(2) { animation-delay: 0.2s; }
        .loading span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: translateY(0);
                opacity: 0.5;
            }
            40% {
                transform: translateY(-8px);
                opacity: 1;
            }
        }

        .results-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--border-subtle);
        }

        .results-header {
            font-size: 13px;
            font-weight: 700;
            color: var(--black-primary);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .results-content {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .audio-container {
            background: var(--cream-bg);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 16px;
            flex: 1;
            display: flex;
            align-items: center;
        }

        audio {
            width: 100%;
            height: 40px;
        }

        audio::-webkit-media-controls-panel {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        #downloadBtn {
            background: var(--teal-deep);
            color: white;
            box-shadow: 0 4px 15px rgba(26, 107, 71, 0.3);
            flex: 0 0 auto;
        }

        #downloadBtn:hover:not(:disabled) {
            background: var(--teal-deep-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(26, 107, 71, 0.4);
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: var(--slate-text);
            background: var(--cream-bg);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 768px) {
            .results-content {
                flex-direction: column;
            }

            #downloadBtn {
                width: 100%;
            }
        }

        @media (max-width: 640px) {
            .container {
                margin: 10px;
            }

            .header-title {
                font-size: 24px;
            }

            .content {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"></div>
        <div class="header-accent"></div>

        <div class="header-content">
            <h1 class="header-title">🎧 AudioLearner</h1>
            <p class="header-description">Transform topics into engaging audio lessons</p>
        </div>

        <div class="content">
            <form id="audioForm">
                <div class="form-group">
                    <label for="topic">Topic</label>
                    <input
                        type="text"
                        id="topic"
                        name="topic"
                        placeholder="e.g., AI Agents, Quantum Computing..."
                        required
                        autocomplete="off"
                    >
                </div>

                <div class="form-group">
                    <label for="timePeriod">Time Period</label>
                    <div class="custom-select" id="customSelect" tabindex="0">
                        <span class="select-text placeholder" id="selectText">Select period</span>
                        <svg class="select-arrow" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                        <div class="select-dropdown" id="selectDropdown">
                            <div class="select-option" data-value="Today">Today</div>
                            <div class="select-option" data-value="Last 3 days">Last 3 days</div>
                            <div class="select-option" data-value="Last week">Last week</div>
                        </div>
                    </div>
                    <select id="timePeriod" name="timePeriod" required>
                        <option value="" disabled selected>Select period</option>
                        <option value="Today">Today</option>
                        <option value="Last 3 days">Last 3 days</option>
                        <option value="Last week">Last week</option>
                    </select>
                </div>

                <div id="errorMessage" class="message error-message hidden"></div>
                <div id="successMessage" class="message success-message hidden"></div>

                <div id="loading" class="loading hidden">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <div class="button-group">
                    <button type="submit" id="generateBtn">Generate Audio</button>
                    <button type="reset" class="clear-btn">Clear</button>
                </div>
            </form>

            <div id="resultSection" class="results-section hidden">
                <h3 class="results-header">Generated Audio</h3>

                <div class="results-content">
                    <div class="audio-container">
                        <audio id="audioElement" controls></audio>
                    </div>

                    <button id="downloadBtn">Download Audio</button>
                </div>
            </div>
        </div>

        <div class="footer">
            Powered by n8n Cloud & OpenAI
        </div>
    </div>

    <script>
        const form = document.getElementById('audioForm');
        const loading = document.getElementById('loading');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');
        const resultSection = document.getElementById('resultSection');
        const audioElement = document.getElementById('audioElement');
        const downloadBtn = document.getElementById('downloadBtn');
        const submitBtn = document.getElementById('generateBtn');

        const WEBHOOK_URL = 'https://lcharyfire1.app.n8n.cloud/webhook/7abdcd0a-09a9-48bf-826f-4d4662e0fde4';

        let currentAudioBlob = null;

        // Custom select functionality
        const customSelect = document.getElementById('customSelect');
        const selectText = document.getElementById('selectText');
        const selectDropdown = document.getElementById('selectDropdown');
        const timePeriodSelect = document.getElementById('timePeriod');
        const selectOptions = selectDropdown.querySelectorAll('.select-option');

        customSelect.addEventListener('click', (e) => {
            e.stopPropagation();
            customSelect.classList.toggle('active');
        });

        selectOptions.forEach(option => {
            option.addEventListener('click', (e) => {
                e.stopPropagation();
                const value = option.getAttribute('data-value');

                // Update custom select
                selectText.textContent = value;
                selectText.classList.remove('placeholder');

                // Update hidden native select
                timePeriodSelect.value = value;

                // Update selected state
                selectOptions.forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');

                // Close dropdown
                customSelect.classList.remove('active');
            });
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', () => {
            customSelect.classList.remove('active');
        });

        // Keyboard support
        customSelect.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                customSelect.classList.toggle('active');
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const topic = document.getElementById('topic').value.trim();
            const timePeriod = document.getElementById('timePeriod').value.trim();

            if (!topic || !timePeriod) {
                showError('Please fill in all fields');
                return;
            }

            await generateAudio(topic, timePeriod);
        });

        form.addEventListener('reset', () => {
            selectText.textContent = 'Select period';
            selectText.classList.add('placeholder');
            selectOptions.forEach(opt => opt.classList.remove('selected'));
            resultSection.classList.add('hidden');
            clearMessages();
        });

        async function generateAudio(topic, timePeriod) {
            clearMessages();
            loading.classList.remove('hidden');
            resultSection.classList.add('hidden');
            submitBtn.disabled = true;

            try {
                const payload = {
                    topic: topic,
                    timePeriod: timePeriod
                };

                console.log('Sending request to webhook:', WEBHOOK_URL);
                console.log('Payload:', payload);

                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                console.log('Response status:', response.status);

                if (!response.ok) {
                    throw new Error(`Server error: ${response.status} ${response.statusText}`);
                }

                const audioBlob = await response.blob();
                console.log('Audio blob size:', audioBlob.size, 'bytes');

                if (!audioBlob || audioBlob.size === 0) {
                    throw new Error('Received empty audio file');
                }

                const audioUrl = URL.createObjectURL(audioBlob);
                audioElement.src = audioUrl;
                audioElement.load();
                currentAudioBlob = audioBlob;
                console.log('Audio URL created:', audioUrl);

                resultSection.classList.remove('hidden');

                showSuccess('Audio generated successfully!');

            } catch (error) {
                console.error('Error:', error);
                showError(`Failed to generate: ${error.message}`);
            } finally {
                loading.classList.add('hidden');
                submitBtn.disabled = false;
            }
        }

        downloadBtn.addEventListener('click', () => {
            if (!currentAudioBlob) {
                showError('No audio to download');
                return;
            }

            const audioUrl = URL.createObjectURL(currentAudioBlob);
            const a = document.createElement('a');
            a.href = audioUrl;
            const topic = document.getElementById('topic').value.trim().replace(/\s+/g, '_');
            a.download = `audiolearner_${topic}_${Date.now()}.mp3`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            showSuccess('Download started!');
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
            successMessage.classList.add('hidden');
        }

        function showSuccess(message) {
            successMessage.textContent = message;
            successMessage.classList.remove('hidden');
            errorMessage.classList.add('hidden');

            setTimeout(() => {
                successMessage.classList.add('hidden');
            }, 3000);
        }

        function clearMessages() {
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
        }

        document.getElementById('topic').focus();
    </script>
</body>
</html>
